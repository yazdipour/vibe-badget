services:
  vibe-wallet:
    build: .
    container_name: vibe-wallet-dev
    ports:
      - "8080:8080"
    volumes:
      - vibe-wallet-dev-data:/data
    environment:
      DB_PATH: /data/vibe-wallet.db
      ADDR: ":8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  vibe-wallet-dev-data:
