services:
  vibe-wallet:
    image: ghcr.io/sh-yazdipour/vibe-wallet:latest
    container_name: vibe-wallet
    ports:
      - "8080:8080"
    volumes:
      - vibe-wallet-data:/data
    environment:
      DB_PATH: /data/vibe-wallet.db
      ADDR: ":8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  vibe-wallet-data:
